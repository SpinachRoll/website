<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Spinach Roll</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<style>

/* this is where all the style goes */
		body{
			margin: 0;
			background: #ababab;
			font-family: Helvetica, sans-serif;
		}

/* this is where we make the grid, and determine it's size */
		.grid-container {
			display: grid;
			grid-template-columns: 140px 1fr;
			grid-template-rows: 123px 40px 1fr 3em;
			grid-template-areas:
				'header header'
				'navbar navbar'
				'menu main'
				'footer footer';
			position: relative;
			gap: 0px;
			height: 100vh;
		}

		.grid-container > div {
			text-align: center;
		}
			
/* we found a cool font, and include it here */
		@font-face {
			font-family: RSFont;
			src:url(rscbold.ttf);
		}

/* this is where all the header style goes */
		.header { 
			background: #B87030;
			grid-area: header;
		}
		#spinach_roll{
			position: absolute;
			grid-area: header;
			width: 100%;
			height: 123px;
			z-index: 1;
			top: 0;
			bottom: 0;
			left: 0;
			right: 0;
			margin: auto;
		}
		#king {
			position: absolute;
			grid-area: header; 
			height: 73px;
			width: 73px;
			right: 0;
			bottom: 0;
			z-index: 2;
		}

			
/* this is where all the top navigation bar style goes */
		.navbar { 
			grid-area: navbar; 
			position: sticky;
			top: 0;
			z-index: 3;
		}
			
		#navbar {
			background-color: #131313;
		}
			
		#navbar a {
			font-family: RSFont;
			float: left;
			padding: 10px 0px 0px 0px;
			text-decoration: none;
			font-size: 1.4em;
			color: #005F00;
			width: 23%;
		}

		#navbar a:hover {
			color: #B87030;
		}
/*position : absolute, margin, padding, height and width to hardcode floating. look into display grid. udemy: python and django full stack web developer bootcamp, by jose portilla*/
			
/* this is where all the left navigation bar style goes */	
			
		.leftnav { 
			grid-area: menu;
		}
		#leftnav {
			float: left;
			height: 100%;
			background-color: #131313;
			text-align: center;
			width: 100%;
			z-index: 1;
		}

		#leftnav a {
			font-family: RSFont;
			padding: 17px 3px 3px 3px;
			float: left;
			text-decoration: none;
			font-size: 1.3em;
			color: #005F00;
			width: 100%;
			margin: 0;

		}

		#leftnav a:hover {
			color: #B87030;
		}	

		.sticky_leftnav {
			position: sticky;
			top: 40px;
		}
		
		ul {
			list-style-type: none;
			margin: 0;
			padding: 0;
		}
			
/* this is where all the content style goes */
			
		.main { 
			grid-area: main; 
			position: relative;
		}
		
		#main {
			font-family: RSFont;
			text-align: center;
			text-decoration: none;
			padding: 0px 0px 0px 30px;
		}
		.flex_main {
			display: flex;
			flex-flow: row wrap;
			justify-content: space-around;
		}
		form#combat_level {
			margin: 0;
			float: left;
			text-align: center;
			font-size: 1em;
			padding-bottom: 50px;
		}
		form#combat_level label {
			display: inline-block;
			width: 65px;
			text-align: right;
			padding-top: 3px;
		}
		form#combat_level input{
			box-sizing: border-box;
		}

		#calc_hits_lvl, #calc_cmb_lvl, #cmb_reset{
			font-family:"RSFont";
			font-size: 1em;
		}
			
		form#melle_max_hit {
			margin: 0 ;
			text-align: right;
			font-size: 1em;
		}
		form#melle_max_hit li{
			padding-top: 3px;
			}
		form#melle_max_hit label {
			display: inline;
			width: 70px;
			text-align: right;
		}
		form#melle_max_hit input{
		  width: 157px;
		  text-align: center;
		}		
		form#melle_max_hit select{
		  width: 165px; /* add this line */
			text-align: center;
		}
		#calc_max_hit{
			width: 165px; /* add this line */
			text-align: center;
			font-family:"RSFont";
			font-size: 1em;
		}
		#max_hit_round {
			text-align: left;
		}
/* this is where all the footer style goes */
		.footer { 
			grid-area: footer; 
			font-family: RSFont;
			width: 100%;
			font-size: 1em;
			color: #818181;
			background-color: #131313;
			text-align: center;
			overflow: hidden;
			z-index: 3;
		}
			
		</style>
	</head>
	<body>
		<div class="grid-container">
			<div class="header">
				<a href="home.html">
					<img id="spinach_roll" src="images/title_spinach_roll_3.png" alt="logo">
				</a>
				<a href="index.html">
					<img id="king" src="images/king_t5.png" alt="Your King">
				</a>
			</div>
			<div id="navbar" class="navbar">
				<a href="melee.html">COMBAT</a>
				<a href="smithing.html">SKILLS</a>
				<a href="javascript:void(0)"><s>HS Tracker</s></a>
				<a href="javascript:void(0)"><s>Credits</s></a>
			</div>
			<div id="leftnav" class="leftnav">
				<div class="sticky_leftnav">
					<ul>
						<li><a href="melee.html">
							<s>Melee</s>
						</li>
						<li><a href="range.html">
							<s>Range</s>
						</li>
						<li>
							<a href="javascript:void(0)">
								<s>Prayer</s>
						</li>
						<li>
							<a href="javascript:void(0)">
								<s>Magic</s>
						</li>
					</ul>
				</div>
			</div>  
			<div id="main" class="main">
				<h1>Combat Calculators</h1>
				<div id="flex_main" class="flex_main">
					<form id="combat_level" style="flex-basis: 18em">
						<fieldset>
							<legend id="cmb_calc_form" style="text-align: center;">Combat Level</legend>
							<ul>
								<li><label for="attack_lvl">Attack</label>
									<input type="number" id="att_lvl" name="attack_lvl" value="1" min="1" max="99"></li>
								<li><label for="defense_lvl">Defense</label>
									<input type="number" id="def_lvl" name="defense_lvl" value="1" min="1" max="99"></li>
								<li><label for="strength_lvl">Strength</label>
									<input type="number" id="str_lvl" name="strength_lvl" value="1" min="1" max="99"></li>
								<li><button type="button" id="calc_hits_lvl">Calc Hit</button>
									<input type="number" id="hits_lvl" name="hits_lvl" value="10" min="1" max="99"></li>
								<li><label for="range_lvl">Range</label>
									<input type="number" id="range_lvl" name="range_lvl" value="1" min="1" max="99"></li>
								<li><label for="prayer_lvl">Prayer</label>
									<input type="number" id="pray_lvl" name="prayer_lvl" value="1" min="1" max="99"></li>
								<li><label for="magic_lvl">Magic</label>
									<input type="number" id="magic_lvl" name="magic_lvl" value="1" min="1" max="99"></li>
									<li><button type="button" id="calc_cmb_lvl">Combat Level</button>
									<input type="reset" value="Reset" id="cmb_reset"></li>
								<li><p id="cmb_lvl">Your Combat Level is 3.5</p></li>
							</ul>
						</fieldset>
					</form>
					<form id="melle_max_hit" style="flex-basis: 18em">
						<fieldset>
							<legend id="melle_max_hit_calc_form" style="text-align: center;">Melle Max Hit Calculator</legend>
							<ul>
								<li><label for="mh_str_lvl">Str Level</label>
									<input type="number" id="mh_str_lvl" name="mh_str_lvl" value="1" min="1" max="99"></li>
								<li><label for="mh_weap_pwr">Weap Power</label>
									<input type="number" id="mh_weap_pwr" name="mh_weap_pwr" value="1" min="1" max="88"></li>
								<li><label for="mh_potions">Potions?</label>
									<select name="mh_potions" id="mh_potions">
									  <option value="0">No Potion</option>
									  <option value="1">Regular Strength Potion</option>
									  <option value="2">Super Strength Potion</option>
									  <option value="3">Potion of Zamorak</option>
									</select></li>								
								<li><label for="mh_prayer">Prayer?</label>
									<select name="mh_prayer" id="mh_prayer">
									  <option value="1.00">No Prayer</option>
									  <option value="1.05">Burst of Strength</option>
									  <option value="1.10">Super Human Strength</option>
									  <option value="1.15">Ultimate Strength</option>
									</select></li>								
								<li><label for="mh_cmb_style">Cmb Style?</label>
									<select name="mh_cmb_style" id="mh_cmb_style">
									  <option value="1">Controlled</option>
									  <option value="3">Aggressive</option>
									  <option value="0">Accurate</option>
									  <option value="0">Defensive</option>
									</select></li>
									<li><button type="button" id="calc_max_hit_btn">Calculate Max Hit</button>
								<li><p id="max_hit_round">Your Max Hit is 1</p></li>
							</ul>
						</fieldset>
					</form>
				</div>
			</div>
				
			<div class="footer">	<p>SpinachRoll is where i edit the files to redeploy</p>
			</div>
		</div>

<script language="javascript" src="js/combat_calc.js" type="text/javascript"></script>

	</body>
</html>
